function getScrubDate() {
  const d = new Date();
  d.setDate(d.getDate() + scrubOffset);
  return d;
}

function formatPlanDate(d) {
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

function setScrub(val) {
  scrubOffset = parseInt(val) || 0;
  renderDashboard();
}

function resetScrub() {
  scrubOffset = 0;
  renderDashboard();
}

function pickN(arr,n,rng){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,Math.min(n,a.length));}

function buildTrafficLights(phaseName, rel, stage) {
  const phaseKey = stage === 'postmenopause' ? 'postmenopause' : getPhaseKey(phaseName);
  const romantic = isRomantic(rel);
  const items = Object.entries(TL_DATA).map(([id, ind]) => {
    if (ind.romanticOnly && !romantic) return '';
    const r = ind.phases[phaseKey];
    const lbl = {green:'GO', yellow:'CARE', red:'WAIT'}[r.light];
    return `<div class="tl-item" onclick="showTLPopup('${id}','${phaseKey}')">
      <div class="tl-light ${r.light}"></div>
      <div class="tl-emoji">${ind.emoji}</div>
      <div class="tl-label">${ind.label}</div>
      <div class="tl-status ${r.light}">${lbl}</div>
    </div>`;
  }).filter(Boolean).join('');
  return `<div class="tl-dashboard">
    <div class="tl-title">🚦 Right Now — Today's Green Lights</div>
    <div class="tl-grid">${items}</div>
  </div>`;
}

function showTLPopup(id, phaseKey) {
  const ind = TL_DATA[id]; if (!ind) return;
  const r = ind.phases[phaseKey];
  const col = {green:'#3dbb3d',yellow:'#ccaa00',red:'#cc2222'}[r.light];
  const lbl = {green:'GO — Good timing',yellow:'CARE — Read the room',red:'WAIT — Not now'}[r.light];
  const container = document.getElementById('tl-popup-container');
  container.innerHTML = `<div class="tl-popup">
    <button class="tl-popup-close" onclick="document.getElementById('tl-popup-container').innerHTML=''">✕</button>
    <div class="tl-popup-head"><span style="font-size:1.2em">${ind.emoji}</span><span>${ind.label}</span><span style="color:${col};font-size:.8em;font-weight:700">${lbl}</span></div>
    <div class="tl-popup-body">${r.tip}</div>
  </div>`;
  setTimeout(() => {
    document.addEventListener('click', () => { container.innerHTML = ''; }, {once:true});
  }, 100);
}

// ── Scrubber HTML builder ──────────────────────────────────
function buildScrubber() {
  const planDate = getScrubDate();
  const isPlanning = scrubOffset > 0;
  const dateStr = isPlanning ? formatPlanDate(planDate) : 'Today — ' + formatPlanDate(planDate);
  const ticks = ['Today','1w','2w','3w','1mo'];
  return `<div class="scrubber-wrap">
    <div class="scrubber-row">
      <div class="scrubber-info">
        <div class="scrubber-eyebrow">${isPlanning ? '📅 Planning Mode' : '📅 Plan Ahead'}</div>
        <div class="scrubber-datetext">${dateStr}${isPlanning ? ' (+' + scrubOffset + 'd)' : ''}</div>
      </div>
      <button class="scrubber-btn${isPlanning ? ' is-active' : ''}" onclick="resetScrub()">↩ Reset to Today</button>
    </div>
    <input type="range" class="day-slider" min="0" max="30" value="${scrubOffset}"
      oninput="setScrub(this.value)" />
    <div class="scrubber-ticks">${ticks.map(t=>`<span class="scrubber-tick">${t}</span>`).join('')}</div>
  </div>`;
}

function getPhase(day,len){const d=Math.round(Math.min(day,len)/len*28);for(const p of PHASES)if(p.days.includes(d))return p;return PHASES[4];}
function calcLearned(){const h=(userData.history||[]).map(d=>new Date(d+'T12:00:00')).sort((a,b)=>a-b);if(h.length<2)return null;const diffs=[];for(let i=1;i<h.length;i++)diffs.push(Math.round((h[i]-h[i-1])/86400000));const v=diffs.filter(d=>d>=21&&d<=45);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null;}

function getTodayInfo(){
  if(!userData.periodStart)return null;
  const len=parseInt(userData.cycleLength)||28;
  const today=getScrubDate();today.setHours(0,0,0,0);
  const sd=new Date(userData.periodStart+'T12:00:00');sd.setHours(0,0,0,0);
  let day=(Math.floor((today-sd)/86400000)%len)+1;
  if(day<1)day=1;
  const phase=getPhase(day,len);
  const rel=userData.relationship||'girlfriend';
  const stage=getLifeStage(userData.age||30);
  const rng=seedRand(dailySeed()*100+day);
  const oneliners=phase.oneliners[rel]||phase.oneliners.girlfriend;
  const oneliner=pickOne(oneliners,rng);
  const wpPool=isRomantic(rel)?phase.wins_romantic:(rel==='friend'?phase.wins_friend:phase.wins_family);
  const winpoints=pickN(wpPool,4,rng);
  const nsPool=isRomantic(rel)?phase.notsay_romantic:(rel==='friend'?phase.notsay_friend:phase.notsay_family);
  const notsay=pickOne(nsPool,seedRand(dailySeed()*100+day+999));
  const hormones=stage==='perimenopause'?phase.hormones_peri:(stage==='menopause'?phase.hormones_meno:phase.hormones_std);
  return{phase,day,len,oneliner,winpoints,notsay,rel,stage,hormones};
}

        <div class="section-title">📅 Period History (${h.length} logged)</div>
        ${learned?`<div class="learned-badge">📈 Learned cycle: <strong>${learned} days</strong></div>`:''}
        ${h.map(d=>`<div class="history-item"><span>🔴 ${new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</span><button class="del" data-date="${d}">🗑️</button></div>`).join('')}
      `:''}
      <hr>
      <div class="section-title">🔔 Browser Notifications</div>
      <button class="btn btn-green" id="notif-btn">🔔 Enable Browser Notifications</button>
      <hr>
      <div class="section-title">📧 Email Reminders (EmailJS)</div>
      <div class="emailjs-info">1. Sign up free at <a href="https://emailjs.com" target="_blank">emailjs.com</a><br>2. Create an Email Service<br>3. Create a Template and paste our pre-built code<br>4. Enter your IDs below</div>
      <button class="btn btn-outline" id="copy-template-btn" style="margin-bottom:16px">📋 Copy Email Template Code</button>
      <label>Your Email</label><input type="email" id="notify-email" value="${userData.notifyEmail||''}" placeholder="you@example.com"/>
      <label>EmailJS Service ID</label><input id="ejs-svc" value="${userData.ejsSvc||''}" placeholder="service_xxxxxxx"/>
      <label>EmailJS Template ID</label><input id="ejs-tmpl" value="${userData.ejsTmpl||''}" placeholder="template_xxxxxxx"/>
      <label>EmailJS Public Key</label><input id="ejs-key" value="${userData.ejsKey||''}" placeholder="xxxxxxxxxxxxxx"/>
      <button class="btn btn-green" id="save-email-btn">📧 Save Email Settings</button>
      <button class="btn btn-outline" id="test-email-btn">🧪 Send Test Email</button>
      <hr>
      <button class="btn btn-outline" id="so-btn2">🚪 Sign Out</button>
    </div>`;

  $('save-btn').onclick=async()=>{
    const herName=$('her-name').value||'Her',relationship=$('her-rel').value,age=parseInt($('her-age').value)||30;
    const st=getLifeStage(age),isPostNow=st==='postmenopause';
    const updates={herName,relationship,age};
    const periodStart=$('period-start').value;
    if(periodStart){const h2=userData.history||[];if(!h2.includes(periodStart))h2.push(periodStart);updates.periodStart=periodStart;updates.history=h2;}
    if(!isPostNow){const cl=$('cycle-length');if(cl)updates.cycleLength=parseInt(cl.value)||28;}
    if(!periodStart&&!isPostNow){alert('Please enter the first day of her period.');return;}
    await saveUserData(updates);alert('✅ Profile saved and synced!');showPage('dashboard');
  };
  $('log-btn').onclick=async()=>{
    const d=$('new-period-date').value;if(!d){alert('Please enter a date.');return;}
    const h2=userData.history||[];if(!h2.includes(d))h2.push(d);
    const sorted=[...h2].sort((a,b)=>new Date(b)-new Date(a));
    const lrn=calcLearned();const upd={history:h2,periodStart:sorted[0]};
    if(lrn)upd.cycleLength=lrn;
    await saveUserData(upd);alert(`✅ Period logged!${lrn?'\n📈 Learned cycle: '+lrn+' days':''}`);renderSetup();
  };
  document.querySelectorAll('.del').forEach(btn=>{btn.onclick=async()=>{const h2=(userData.history||[]).filter(d=>d!==btn.dataset.date);await saveUserData({history:h2});renderSetup();};});
  $('notif-btn').onclick=()=>{if(!('Notification' in window)){alert('Not supported.');return;}Notification.requestPermission().then(p=>{if(p==='granted')alert('✅ Enabled!');});};
  $('copy-template-btn').onclick=()=>{navigator.clipboard.writeText(EMAIL_TEMPLATE).then(()=>{const b=$('copy-template-btn');b.textContent='✅ Copied!';setTimeout(()=>{b.textContent='📋 Copy Email Template Code';},3000);}).catch(()=>alert('Copy failed.'));};
  $('save-email-btn').onclick=async()=>{await saveUserData({notifyEmail:$('notify-email').value,ejsSvc:$('ejs-svc').value,ejsTmpl:$('ejs-tmpl').value,ejsKey:$('ejs-key').value});alert('✅ Email settings saved!');};
  $('test-email-btn').onclick=()=>{
    const{notifyEmail:em,ejsSvc:sv,ejsTmpl:tm,ejsKey:ky}=userData;
    if(!em||!sv||!tm||!ky){alert('Fill in all EmailJS fields first.');return;}
    const i=getTodayInfo();if(!i){alert('Set up her cycle first.');return;}
    emailjs.init(ky);
    emailjs.send(sv,tm,{to_email:em,her_name:userData.herName||'Her',phase:i.phase.name,phase_emoji:i.phase.emoji,day:i.day,cycle_length:i.len,one_liner:i.oneliner,hormones:i.hormones,mood:i.phase.mood,tip:i.winpoints[0],not_say:i.notsay,progress_pct:Math.round(i.day/i.len*100)})
      .then(()=>alert('✅ Test email sent!'),e=>alert('❌ '+JSON.stringify(e)));
  };
  $('so-btn2').onclick=doSignOut;
}

// ── Reference ──────────────────────────────────────────────
function renderReference(){
  $('reference').innerHTML=
    `<h2 style="margin-bottom:16px;font-size:1.2em">📖 Complete Cycle Guide</h2>`+
    PHASES.map(p=>`<div class="phase-ref">
      <h3 style="margin-bottom:6px">${p.emoji} ${p.name} <span style="color:#666;font-size:.8em">(Days ${p.days[0]}–${p.days[p.days.length-1]})</span></h3>
      <p style="margin-bottom:8px;color:#888;font-size:.85em;line-height:1.5">${p.hormones_std}</p>
      <p style="color:#ff6666;font-size:.82em;margin-bottom:4px">🚫 e.g. ${p.notsay_romantic[0]}</p>
      <p style="color:#44cc44;font-size:.82em">🏆 e.g. ${p.wins_romantic[0]}</p>
    </div>`).join('')+
    `<h2 style="margin:24px 0 16px;font-size:1.2em">🌿 Menopause Stages</h2>`+
    [['🌿 Perimenopause (40–54)','Cycles become irregular, symptoms intensify. All standard phases still apply but with amplified effects. Hot flashes, brain fog, mood swings, and sleep disruption layer on top of the normal cycle symptoms.'],
     ['🌙 Menopause (51–58)','Periods are rare or have stopped. Daily Hormonal Focus dashboard becomes the primary guide — rotating through Hot Flash, Brain Fog, Emotional Intensity, Sleep Disruption, and Low Energy days.'],
     ['✨ Post-Menopause (55+)','Hormones have settled at a new lower baseline. Steady-state dashboard with consistent tips on appreciation, energy support, emotional connection, and showing up for this chapter.']
    ].map(([t,d])=>`<div class="phase-ref"><h3 style="margin-bottom:6px">${t}</h3><p style="color:#888;font-size:.85em;line-height:1.5">${d}</p></div>`).join('')+
    `<h2 style="margin:24px 0 16px;font-size:1.2em">🚦 Traffic Light Guide</h2>`+
    `<div class="phase-ref"><p style="color:#888;font-size:.85em;line-height:1.9">
      <span style="color:#3dbb3d;font-weight:700">🟢 GO</span> — Good timing. She\'s receptive. Go for it.<br>
      <span style="color:#ccaa00;font-weight:700">🟡 CARE</span> — Proceed with awareness. Read the situation first.<br>
      <span style="color:#cc2222;font-weight:700">🔴 WAIT</span> — Not the right moment. Find a better window.<br><br>
      Tap any light on the dashboard for a full explanation.
    </p></div>`;
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  $(id).classList.add('active');$('nav-'+id).classList.add('active');
  if(id==='dashboard')renderDashboard();
  if(id==='setup')renderSetup();
  if(id==='reference')renderReference();
}

$('tab-login').onclick=()=>switchTab('login');$('tab-signup').onclick=()=>switchTab('signup');
$('btn-login').onclick=doLogin;$('btn-signup').onclick=doSignup;
$('btn-google-1').onclick=doGoogle;$('btn-google-2').onclick=doGoogle;
$('nav-dashboard').onclick=()=>showPage('dashboard');
$('nav-setup').onclick=()=>showPage('setup');
$('nav-reference').onclick=()=>showPage('reference');
</script>

</body>
